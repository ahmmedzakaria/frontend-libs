<form [formGroup]="form" (ngSubmit)="submit()" class="p-4 shadow-sm rounded bg-white">
    <div class="mb-3">
        <label for="name" class="form-label fw-semibold">Name</label>
        <input
                id="name"
                type="text"
                class="form-control"
                formControlName="name"
                placeholder="Enter full name" />
        <div class="text-danger small" *ngIf="form.get('name')?.invalid && form.get('name')?.touched">
            Name is required.
        </div>
    </div>

    <div class="mb-3">
        <label for="email" class="form-label fw-semibold">Email</label>
        <input
                id="email"
                type="email"
                class="form-control"
                formControlName="email"
                placeholder="Enter email address" />
        <div class="text-danger small" *ngIf="form.get('email')?.invalid && form.get('email')?.touched">
            Valid email is required.
        </div>
    </div>

    <div class="mb-3">
        <label for="phone" class="form-label fw-semibold">Phone</label>
        <input
                id="phone"
                type="tel"
                class="form-control"
                formControlName="phone"
                placeholder="Enter phone number" />
        <div class="text-danger small" *ngIf="form.get('phone')?.invalid && form.get('phone')?.touched">
            Phone is required.
        </div>
    </div>

    <div class="mb-3">
        <label for="photo" class="form-label fw-semibold">Photo</label>
        <input
                id="photo"
                type="file"
                class="form-control"
                (change)="onFileSelected($event)" />
    </div>

    <div class="d-flex justify-content-end">
        <button
                type="submit"
                class="btn btn-primary px-4"
                [disabled]="form.invalid">
            <i class="fa-solid fa-save me-2"></i> Save
        </button>
    </div>
</form>
