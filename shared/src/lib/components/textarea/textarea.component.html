<div class="textarea-wrapper">
    <div class="form-floating position-relative">
    <textarea
        #textareaEl
        class="form-control"
        [class.is-invalid]="errorMessage"
        [attr.placeholder]="placeholder || label"
        [attr.rows]="rows"
        [attr.maxlength]="maxLength"
        [disabled]="disabled"
        [value]="value"
        (input)="onInput($event)"
        (blur)="onBlur()"
        [attr.aria-label]="label"
    ></textarea>

        <label *ngIf="label">{{ label }} <span *ngIf="required" class="text-danger">*</span></label>

        <div class="char-count text-muted" *ngIf="maxLength">
            {{ value.length || 0 }} / {{ maxLength }}
        </div>
    </div>

    <small *ngIf="helpText && !errorMessage" class="text-muted">{{ helpText }}</small>
    <div *ngIf="errorMessage" class="invalid-feedback d-block mt-1">{{ errorMessage }}</div>
</div>
